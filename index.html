<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>一起来养猫 🐱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#fef9ef;--card:#fff;--pink:#ff8fab;--pink2:#ff5c8a;--blue:#a2d2ff;--mint:#b8e0d2;--gold:#ffd166;--orange:#f4845f;--text:#2b2d42;--success:#06d6a0;--danger:#ef476f;--shadow:0 4px 20px rgba(0,0,0,.08)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* SCREENS */
.screen{display:none;min-height:100vh;padding:20px 16px}
.screen.active{display:flex;flex-direction:column;align-items:center}

/* WELCOME */
#welcome{justify-content:center;text-align:center}
#welcome h1{font-size:2.2em;margin-bottom:6px;background:linear-gradient(135deg,var(--pink2),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#welcome .sub{color:#888;margin-bottom:28px;font-size:1em}
.cat-picker{display:flex;gap:16px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.cat-option{width:110px;height:130px;border:3px solid #eee;border-radius:24px;cursor:pointer;transition:all .3s;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:var(--shadow)}
.cat-option:hover,.cat-option.selected{border-color:var(--pink);transform:scale(1.06);box-shadow:0 6px 25px rgba(255,143,171,.3)}
.cat-option .cat-label{font-size:.8em;color:#888;font-weight:600}
.name-input{padding:12px 20px;font-size:1.1em;border:2px solid #eee;border-radius:14px;width:260px;text-align:center;outline:none;margin-bottom:20px;transition:border .2s}
.name-input:focus{border-color:var(--pink)}
.btn{padding:12px 32px;font-size:1em;border:none;border-radius:14px;cursor:pointer;font-weight:700;transition:all .2s;letter-spacing:.5px}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;box-shadow:0 4px 15px rgba(255,92,138,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,92,138,.4)}
.btn-primary:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none}
.btn-sm{padding:8px 16px;font-size:.85em;border-radius:10px}
.btn-secondary{background:var(--blue);color:var(--text)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ffb703);color:var(--text)}
.btn-ghost{background:transparent;border:2px solid #ddd;color:var(--text)}

/* ===== CSS CAT ===== */
.css-cat{position:relative;display:inline-block;transition:all .4s}
.css-cat.stage-1{transform:scale(.7)}
.css-cat.stage-2{transform:scale(1)}
.css-cat.stage-3{transform:scale(1.25)}
.cat-body-wrap{position:relative;width:100px;height:100px}
.cat-body{width:80px;height:70px;border-radius:50% 50% 45% 45%;position:absolute;bottom:0;left:10px}
.cat-head{width:65px;height:55px;border-radius:50% 50% 45% 45%;position:absolute;top:0;left:17.5px;z-index:2}
.cat-ear{width:0;height:0;position:absolute;top:-8px;z-index:3}
.cat-ear-l{left:14px;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:20px solid}
.cat-ear-r{right:14px;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:20px solid}
.cat-ear-inner{width:0;height:0;position:absolute;top:-4px;z-index:4}
.cat-ear-inner-l{left:18px;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:13px solid}
.cat-ear-inner-r{right:18px;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:13px solid}
.cat-eye{width:12px;height:14px;background:#2b2d42;border-radius:50%;position:absolute;top:22px;z-index:5}
.cat-eye::after{content:'';width:4px;height:4px;background:#fff;border-radius:50%;position:absolute;top:3px;right:2px}
.cat-eye-l{left:28px}
.cat-eye-r{right:28px}
.cat-nose{width:7px;height:5px;background:var(--pink2);border-radius:50% 50% 40% 40%;position:absolute;top:34px;left:50%;transform:translateX(-50%);z-index:5}
.cat-mouth{position:absolute;top:38px;left:50%;transform:translateX(-50%);z-index:5}
.cat-mouth::before,.cat-mouth::after{content:'';width:8px;height:5px;border-bottom:2px solid #999;border-radius:0 0 50% 50%;position:absolute;top:0}
.cat-mouth::before{left:-8px}
.cat-mouth::after{left:1px}
.cat-whisker{position:absolute;height:1.5px;background:#aaa;z-index:5;width:20px;top:35px}
.cat-w1{left:-4px;transform:rotate(-10deg)}
.cat-w2{left:-4px;top:40px;transform:rotate(10deg)}
.cat-w3{right:-4px;transform:rotate(10deg)}
.cat-w4{right:-4px;top:40px;transform:rotate(-10deg)}
.cat-tail{width:40px;height:8px;border-radius:0 8px 8px 0;position:absolute;bottom:15px;right:-25px;transform-origin:left center;animation:tailWag 2s ease-in-out infinite;z-index:1}
@keyframes tailWag{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(15deg)}}
.cat-paw{width:16px;height:12px;border-radius:50%;position:absolute;bottom:-4px;z-index:3}
.cat-paw-l{left:18px}
.cat-paw-r{right:18px}
.crown-wrap{position:absolute;top:-30px;left:50%;transform:translateX(-50%);z-index:10;font-size:28px;animation:crownFloat 2s ease-in-out infinite}
@keyframes crownFloat{0%,100%{transform:translateX(-50%) translateY(0) rotate(-3deg)}50%{transform:translateX(-50%) translateY(-6px) rotate(3deg)}}
@keyframes catBounce{0%{transform:translateY(0)}30%{transform:translateY(-15px)}50%{transform:translateY(0)}70%{transform:translateY(-8px)}100%{transform:translateY(0)}}
.css-cat.bounce{animation:catBounce .5s ease}
@keyframes catIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.cat-body-wrap{animation:catIdle 2.5s ease-in-out infinite}

/* Color themes */
.theme-orange .cat-body,.theme-orange .cat-head{background:#f4a261}
.theme-orange .cat-ear-l,.theme-orange .cat-ear-r{border-bottom-color:#f4a261}
.theme-orange .cat-ear-inner-l,.theme-orange .cat-ear-inner-r{border-bottom-color:#ffb4a2}
.theme-orange .cat-tail{background:#e08f4e}
.theme-orange .cat-paw{background:#e08f4e}

.theme-black .cat-body,.theme-black .cat-head{background:#4a4e69}
.theme-black .cat-ear-l,.theme-black .cat-ear-r{border-bottom-color:#4a4e69}
.theme-black .cat-ear-inner-l,.theme-black .cat-ear-inner-r{border-bottom-color:#6b6f8a}
.theme-black .cat-tail{background:#3a3d56}
.theme-black .cat-paw{background:#3a3d56}

.theme-white .cat-body,.theme-white .cat-head{background:#f0e6d3}
.theme-white .cat-ear-l,.theme-white .cat-ear-r{border-bottom-color:#f0e6d3}
.theme-white .cat-ear-inner-l,.theme-white .cat-ear-inner-r{border-bottom-color:#fce4d8}
.theme-white .cat-tail{background:#e0d6c3}
.theme-white .cat-paw{background:#e0d6c3}

.theme-grey .cat-body,.theme-grey .cat-head{background:#adb5bd}
.theme-grey .cat-ear-l,.theme-grey .cat-ear-r{border-bottom-color:#adb5bd}
.theme-grey .cat-ear-inner-l,.theme-grey .cat-ear-inner-r{border-bottom-color:#d0d5db}
.theme-grey .cat-tail{background:#9aa0a8}
.theme-grey .cat-paw{background:#9aa0a8}

.theme-siamese .cat-body,.theme-siamese .cat-head{background:#f5e6ca}
.theme-siamese .cat-ear-l,.theme-siamese .cat-ear-r{border-bottom-color:#8b6f4e}
.theme-siamese .cat-ear-inner-l,.theme-siamese .cat-ear-inner-r{border-bottom-color:#c9a87c}
.theme-siamese .cat-tail{background:#8b6f4e}
.theme-siamese .cat-paw{background:#8b6f4e}

.theme-persian .cat-body,.theme-persian .cat-head{background:#e8e0f0}
.theme-persian .cat-ear-l,.theme-persian .cat-ear-r{border-bottom-color:#d0c0e0}
.theme-persian .cat-ear-inner-l,.theme-persian .cat-ear-inner-r{border-bottom-color:#e8d8f8}
.theme-persian .cat-tail{background:#d0c0e0}
.theme-persian .cat-paw{background:#d0c0e0}

.theme-ragdoll .cat-body{background:#f0f0f5}
.theme-ragdoll .cat-head{background:#f0f0f5}
.theme-ragdoll .cat-ear-l,.theme-ragdoll .cat-ear-r{border-bottom-color:#c8c8d8}
.theme-ragdoll .cat-ear-inner-l,.theme-ragdoll .cat-ear-inner-r{border-bottom-color:#e0d8f0}
.theme-ragdoll .cat-tail{background:#c8c8d8}
.theme-ragdoll .cat-paw{background:#c8c8d8}

.theme-british .cat-body,.theme-british .cat-head{background:#7b8fa1}
.theme-british .cat-ear-l,.theme-british .cat-ear-r{border-bottom-color:#7b8fa1}
.theme-british .cat-ear-inner-l,.theme-british .cat-ear-inner-r{border-bottom-color:#a0b0c0}
.theme-british .cat-tail{background:#6a7e8f}
.theme-british .cat-paw{background:#6a7e8f}

.theme-american .cat-body{background:#c0c0c0}
.theme-american .cat-head{background:#c0c0c0}
.theme-american .cat-ear-l,.theme-american .cat-ear-r{border-bottom-color:#a0a0a0}
.theme-american .cat-ear-inner-l,.theme-american .cat-ear-inner-r{border-bottom-color:#d8d8d8}
.theme-american .cat-tail{background:#a8a8a8}
.theme-american .cat-paw{background:#a8a8a8}
.theme-american .cat-body{background:repeating-linear-gradient(90deg,#c0c0c0,#c0c0c0 8px,#a8a8a8 8px,#a8a8a8 10px)}

.theme-maine .cat-body,.theme-maine .cat-head{background:#a0724a}
.theme-maine .cat-ear-l,.theme-maine .cat-ear-r{border-bottom-color:#a0724a}
.theme-maine .cat-ear-inner-l,.theme-maine .cat-ear-inner-r{border-bottom-color:#c0906a}
.theme-maine .cat-tail{background:#8a6040}
.theme-maine .cat-paw{background:#8a6040}

.theme-fold .cat-body,.theme-fold .cat-head{background:#d4c4a8}
.theme-fold .cat-ear-l,.theme-fold .cat-ear-r{border-bottom-color:#d4c4a8;top:4px}
.theme-fold .cat-ear-inner-l,.theme-fold .cat-ear-inner-r{border-bottom-color:#e0d0b8;top:6px}
.theme-fold .cat-tail{background:#c0b090}
.theme-fold .cat-paw{background:#c0b090}

.theme-blue .cat-body,.theme-blue .cat-head{background:#6b9ac4}
.theme-blue .cat-ear-l,.theme-blue .cat-ear-r{border-bottom-color:#6b9ac4}
.theme-blue .cat-ear-inner-l,.theme-blue .cat-ear-inner-r{border-bottom-color:#8ab4e0}
.theme-blue .cat-tail{background:#5a88b0}
.theme-blue .cat-paw{background:#5a88b0}

.theme-bengal .cat-body{background:#e8a838}
.theme-bengal .cat-head{background:#e8a838}
.theme-bengal .cat-ear-l,.theme-bengal .cat-ear-r{border-bottom-color:#c88828}
.theme-bengal .cat-ear-inner-l,.theme-bengal .cat-ear-inner-r{border-bottom-color:#f0c060}
.theme-bengal .cat-tail{background:#c88828}
.theme-bengal .cat-paw{background:#c88828}
.theme-bengal .cat-body{background:radial-gradient(circle at 20% 30%,#c88828 3px,transparent 3px),radial-gradient(circle at 60% 20%,#c88828 2px,transparent 2px),radial-gradient(circle at 40% 60%,#c88828 3px,transparent 3px),radial-gradient(circle at 70% 70%,#c88828 2px,transparent 2px),#e8a838}

.theme-lion .cat-body,.theme-lion .cat-head{background:#d4a030}
.theme-lion .cat-ear-l,.theme-lion .cat-ear-r{border-bottom-color:#d4a030}
.theme-lion .cat-ear-inner-l,.theme-lion .cat-ear-inner-r{border-bottom-color:#e8b840}
.theme-lion .cat-tail{background:#c09020}
.theme-lion .cat-paw{background:#c09020}
.theme-lion .cat-head{box-shadow:0 0 0 8px rgba(180,120,20,.4),0 0 0 14px rgba(180,120,20,.2)}

/* ===== GAME SCREEN ===== */
#game{max-width:480px;width:100%;margin:0 auto;padding:12px;justify-content:flex-start}
.top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 0}
.cat-name-display{font-size:1.3em;font-weight:800}
.level-badge{background:linear-gradient(135deg,var(--gold),#ffb703);color:var(--text);padding:4px 14px;border-radius:20px;font-weight:800;font-size:.85em;box-shadow:0 2px 8px rgba(255,209,102,.4)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin:10px 0}
.stat-item{background:var(--card);border-radius:14px;padding:8px 4px;text-align:center;box-shadow:var(--shadow)}
.stat-item .label{font-size:.7em;color:#aaa}
.stat-item .value{font-size:1.1em;font-weight:800}
.growth-wrap{width:100%;margin-bottom:8px}
.growth-bar-bg{width:100%;background:#eee;border-radius:10px;height:14px;overflow:hidden}
.growth-bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--gold));border-radius:10px;transition:width .5s}
.growth-text{text-align:center;font-size:.75em;color:#aaa;margin-top:3px}
.cat-stage{width:100%;text-align:center;padding:10px 0 5px;position:relative;display:flex;justify-content:center;align-items:center;min-height:140px}
.mood-bubble{background:var(--card);padding:6px 16px;border-radius:20px;font-size:.85em;box-shadow:var(--shadow);margin-bottom:12px;display:inline-block;color:#666}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:12px}
.action-btn{background:var(--card);border:2px solid transparent;border-radius:18px;padding:16px 8px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.action-btn::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;transition:opacity .2s;border-radius:16px}
.action-btn:nth-child(1)::before{background:var(--gold)}
.action-btn:nth-child(2)::before{background:var(--blue)}
.action-btn:nth-child(3)::before{background:var(--pink)}
.action-btn:nth-child(4)::before{background:var(--mint)}
.action-btn:hover::before{opacity:.1}
.action-btn:active{transform:scale(.95)}
.action-btn .icon{font-size:28px;display:block;margin-bottom:4px}
.action-btn .text{font-size:.85em;font-weight:700}
.action-btn .count{font-size:.7em;color:#aaa;margin-top:2px}
.action-btn:disabled{opacity:.35;cursor:not-allowed}
.action-btn:disabled:active{transform:none}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.menu-btn{background:var(--card);border:none;border-radius:16px;padding:14px 8px;cursor:pointer;font-weight:700;font-size:.9em;transition:all .2s;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:4px}
.menu-btn:active{transform:scale(.96)}
.menu-btn .menu-icon{font-size:24px}
.menu-btn .badge{background:var(--danger);color:#fff;font-size:.65em;padding:2px 6px;border-radius:8px;position:absolute;top:8px;right:8px}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:var(--bg);border-radius:24px;padding:24px 20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{text-align:center;margin-bottom:16px;font-size:1.2em}
.modal-close{position:absolute;top:14px;right:16px;background:rgba(0,0,0,.06);border:none;width:32px;height:32px;border-radius:50%;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;transition:all .2s}
.modal-close:hover{background:rgba(0,0,0,.12)}

/* DAILY */
.task-item{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.task-item.done{opacity:.5}
.task-left .task-name{font-weight:700;font-size:.95em}
.task-left .task-desc{font-size:.78em;color:#999;margin-top:2px}
.task-reward{font-size:.85em;font-weight:700;color:var(--success)}

/* QUIZ */
.quiz-progress{font-size:.85em;color:#aaa;margin-bottom:8px}
.quiz-question{font-size:2.2em;font-weight:800;margin:16px 0;text-align:center}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{padding:14px;font-size:1.15em;font-weight:700;border:2.5px solid #eee;border-radius:14px;background:var(--card);cursor:pointer;transition:all .15s;text-align:center}
.quiz-opt:active{transform:scale(.96)}
.quiz-opt.correct{border-color:var(--success);background:#e6fff7;color:var(--success)}
.quiz-opt.wrong{border-color:var(--danger);background:#ffe6ec;color:var(--danger)}

/* 24 POINT */
.p24-cards{display:flex;gap:10px;justify-content:center;margin:16px 0}
.p24-card{width:60px;height:80px;background:linear-gradient(135deg,#fff,#f8f8ff);border:2.5px solid var(--pink);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.6em;font-weight:800;box-shadow:0 4px 15px rgba(255,143,171,.2)}
.p24-calculator{margin-top:12px}
.p24-display{background:var(--card);border-radius:12px;padding:12px;text-align:center;font-size:1.3em;font-weight:700;min-height:48px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 2px 4px rgba(0,0,0,.06);margin-bottom:10px;letter-spacing:2px;word-break:break-all;flex-wrap:wrap;gap:4px}
.p24-display .token{display:inline-block;padding:2px 6px;border-radius:6px}
.p24-display .num-token{background:var(--blue);color:var(--text)}
.p24-display .op-token{background:var(--pink);color:#fff}
.p24-keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.p24-key{padding:12px 4px;font-size:1em;font-weight:700;border:2px solid #eee;border-radius:10px;background:var(--card);cursor:pointer;transition:all .15s;text-align:center}
.p24-key:active{transform:scale(.93);background:#f0f0f0}
.p24-key.op{background:var(--pink);color:#fff;border-color:var(--pink)}
.p24-key.op:active{background:var(--pink2)}
.p24-key.action{background:var(--blue);border-color:var(--blue)}
.p24-key.del{background:var(--danger);color:#fff;border-color:var(--danger)}
.p24-result{text-align:center;margin-top:10px;font-weight:700;font-size:.95em;min-height:24px}

/* TOWER */
.tower-info{text-align:center}
.tower-floor-num{font-size:3em;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tower-best{color:#aaa;font-size:.85em;margin:4px 0 12px}
.tower-desc{color:#666;font-size:.85em;margin-bottom:16px;line-height:1.5}
.tower-progress-bar{width:100%;height:6px;background:#eee;border-radius:3px;margin-bottom:12px;overflow:hidden}
.tower-progress-fill{height:100%;background:linear-gradient(90deg,var(--success),var(--mint));transition:width .3s}

/* COLLECTION */
.collection-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.collection-item{background:var(--card);border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;border:2.5px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.collection-item:active{transform:scale(.96)}
.collection-item.active{border-color:var(--pink)}
.collection-item.locked{opacity:.35;filter:grayscale(1)}
.collection-mini-cat{width:50px;height:50px;margin:0 auto 6px;position:relative;transform:scale(.5);transform-origin:center top}
.collection-item .breed-name{font-size:.75em;color:#666;font-weight:600}
.collection-item .unlock-info{font-size:.65em;color:#aaa;margin-top:2px}

/* Cat detail modal */
.cat-detail{text-align:center;padding:10px 0}
.cat-detail .detail-name{font-size:1.2em;font-weight:800;margin-top:8px}
.cat-detail .detail-breed{color:#888;font-size:.9em;margin:4px 0}
.cat-detail .detail-unlock{color:var(--pink);font-size:.85em;margin:8px 0}
.cat-detail .detail-actions{display:flex;gap:8px;justify-content:center;margin-top:14px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--text);color:#fff;padding:12px 24px;border-radius:14px;font-weight:700;z-index:300;transition:transform .3s;font-size:.9em;max-width:85%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:380px){.action-grid{gap:8px}.p24-key{padding:10px 2px;font-size:.9em}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- WELCOME -->
<div class="screen active" id="welcome">
  <h1>🐱 一起来养猫</h1>
  <p class="sub">选择你的第一只猫咪伙伴</p>
  <div class="cat-picker" id="catPicker"></div>
  <input class="name-input" id="catNameInput" placeholder="给猫咪取个名字" maxlength="8">
  <button class="btn btn-primary" id="startBtn" onclick="startGame()">开始养猫 🎉</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="top-bar">

// ===== STATE =====
let S={started:false,cat:{name:'',type:'orange'},level:1,growth:0,food:0,water:0,treats:0,baths:0,lastCheckIn:'',daily:{checkin:false,quiz24:0,quizMul10:0,quizMul19:0},towerBest:0,towerCurrent:0,unlocked:['orange','black','white','grey'],activeCat:'orange',lastDate:''};
function load(){try{const s=localStorage.getItem('catGame2');if(s)S=JSON.parse(s)}catch(e){}}
function save(){localStorage.setItem('catGame2',JSON.stringify(S))}

function checkDay(){const t=new Date().toLocaleDateString();if(S.lastDate!==t){S.daily={checkin:false,quiz24:0,quizMul10:0,quizMul19:0};S.lastDate=t;save()}}

// ===== CAT HTML GENERATOR =====

    <div class="cat-whisker cat-w3"></div><div class="cat-whisker cat-w4"></div>

    <div class="cat-ear-l"></div><div class="cat-ear-r"></div>

    <div class="cat-head"></div>
    <div class="cat-eye cat-eye-l"></div><div class="cat-eye cat-eye-r"></div>
    <div class="cat-nose"></div><div class="cat-mouth"></div>
    <div class="cat-body"></div><div class="cat-tail"></div>

  </div></div></div>`;

// ===== INIT =====
let selIdx=0;
function initPicker(){
  document.getElementById('catPicker').innerHTML=BASIC_CATS.map((c,i)=>`
    <div class="cat-option ${i===0?'selected':''}" onclick="selCat(this,${i})">
      ${makeCatHTML(c.theme,1)}
      <span class="cat-label">${c.name}</span>
    </div>`).join('');
}
function selCat(el,i){document.querySelectorAll('.cat-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');selIdx=i}

function startGame(){
  const name=document.getElementById('catNameInput').value.trim();
  if(!name){toast('请给猫咪取个名字~');return}
  const c=BASIC_CATS[selIdx];
  S.cat={name,type:c.id};S.started=true;S.lastDate=new Date().toLocaleDateString();
  save();showScreen('game');render();
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ===== RENDER =====
function render(){
  checkDay();
  const catInfo=ALL_CATS.find(c=>c.id===S.activeCat)||BASIC_CATS[0];
  document.getElementById('displayName').textContent=S.cat.name;
  document.getElementById('displayLevel').textContent=`Lv.${S.level}`;
  document.getElementById('statFood').textContent=S.food;
  document.getElementById('statWater').textContent=S.water;
  document.getElementById('statTreat').textContent=S.treats;
  document.getElementById('statBath').textContent=S.baths;
  document.getElementById('feedCount').textContent=`×${S.food}`;
  document.getElementById('waterCount').textContent=`×${S.water}`;
  document.getElementById('treatCount').textContent=`×${S.treats}`;
  document.getElementById('bathCount').textContent=`×${S.baths}`;
  document.getElementById('growthBar').style.width=`${S.growth}%`;
  document.getElementById('growthText').textContent=`成长值: ${S.growth}/100`;

  const stage=S.level>=7?3:S.level>=4?2:1;
  const crowned=S.level>=10;
  document.getElementById('catStage').innerHTML=makeCatHTML(catInfo.theme,stage,crowned);
  updateMood();
}

function updateMood(){
  let p=MOODS.idle;
  if(S.food===0)p=MOODS.hungry;
  else if(S.water===0)p=MOODS.thirsty;
  else if(S.baths===0&&S.level>2)p=MOODS.dirty;
  else p=MOODS.happy;
  document.getElementById('moodBubble').textContent=p[Math.floor(Math.random()*p.length)];
}

function bounceCat(){const el=document.getElementById('catDisplay');if(el){el.classList.remove('bounce');void el.offsetWidth;el.classList.add('bounce')}
  const c=document.querySelector('#catStage .css-cat');if(c){c.classList.remove('bounce');void c.offsetWidth;c.classList.add('bounce')}
}

function addGrowth(n){
  S.growth+=n;
  while(S.growth>=100&&S.level<10){S.growth-=100;S.level++;toast(`🎉 ${S.cat.name} 升到 Lv.${S.level}！`)}
  if(S.level>=10)S.growth=Math.min(S.growth,100);
  save();render();
}

function doFeed(){if(S.food<=0){toast('没有猫粮了，去做任务获取~');return}S.food--;bounceCat();toast('吃得真香！成长+1 🐟');addGrowth(1)}
function doWater(){if(S.water<=0){toast('没有水了，去做任务获取~');return}S.water--;bounceCat();toast('咕噜咕噜~ 成长+1 💧');addGrowth(1)}
function doTreat(){if(S.treats<=0){toast('没有猫条了，去做任务获取~');return}S.treats--;bounceCat();toast('超爱猫条！成长+5 🧶');addGrowth(5)}
function doBath(){if(S.baths<=0){toast('没有洗澡次数了~');return}S.baths--;bounceCat();toast('香喷喷！✨ 成长+1');addGrowth(1)}

// ===== MODALS =====
function openModal(id){document.getElementById(id).classList.add('active');if(id==='dailyModal')renderDaily();if(id==='collectionModal')renderColl();if(id==='towerModal')renderTower()}
function closeModal(id){document.getElementById(id).classList.remove('active')}

// ===== DAILY =====
function renderDaily(){
  const d=S.daily;
  const tasks=[
    {name:'每日签到',desc:'领取1次洗澡',reward:'🛁 ×1',done:d.checkin,fn:doCheckIn},
    {name:'算24点',desc:'完成5题获取猫粮',reward:'🐟 ×1',done:d.quiz24>=5,prog:`${d.quiz24}/5`,fn:()=>{closeModal('dailyModal');startQuiz24()}},
    {name:'10以内乘法',desc:'答对10题获取水',reward:'💧 ×1',done:d.quizMul10>=10,prog:`${d.quizMul10}/10`,fn:()=>{closeModal('dailyModal');startMul(10)}},
    {name:'19以内乘法',desc:'答对10题获取猫条',reward:'🧶 ×1',done:d.quizMul19>=10,prog:`${d.quizMul19}/10`,fn:()=>{closeModal('dailyModal');startMul(19)}},
  ];
  document.getElementById('dailyTasksList').innerHTML=tasks.map(t=>`
    <div class="task-item ${t.done?'done':''}">
      <div class="task-left"><div class="task-name">${t.name} ${t.prog?`(${t.prog})`:''}</div><div class="task-desc">${t.desc}</div></div>
      <div><div class="task-reward">${t.reward}</div>${t.done?'<span style="color:var(--success)">✅</span>':`<button class="btn btn-primary btn-sm" id="dtask_${t.name}">去完成</button>`}</div>
    </div>`).join('');
  // Bind buttons
  tasks.forEach(t=>{if(!t.done){const b=document.getElementById('dtask_'+t.name);if(b)b.onclick=t.fn}});

function doCheckIn(){if(S.daily.checkin){toast('今天已签到~');return}S.daily.checkin=true;S.baths++;save();toast('签到成功！+1次洗澡 🛁');renderDaily();render()}

// ===== MULTIPLICATION QUIZ =====
let MQ={qs:[],cur:0,ok:0,mode:10};
function startMul(mode){
  MQ={qs:[],cur:0,ok:0,mode};
  for(let i=0;i<10;i++){
    let a,b;
    if(mode===10){a=r(2,9);b=r(2,9)}else{a=r(2,18);b=r(2,18)}
    const ans=a*b;MQ.push({a,b,ans,opts:genOpts(ans,4)});
  }
  document.getElementById('quizTitle').textContent=mode===10?'10以内乘法':'19以内乘法';
  showMulQ();openModal('quizModal');
}
MQ.push=function(q){this.qs.push(q)};
function genOpts(c,n){const s=new Set([c]);while(s.size<n){let v=c+r(-8,8);if(v>0&&v!==c)s.add(v)}return shuf([...s])}
function r(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}

function showMulQ(){
  const q=MQ.qs[MQ.cur];
  document.getElementById('quizProgress').textContent=`${MQ.cur+1}/${MQ.qs.length}`;
  document.getElementById('quizQuestion').textContent=`${q.a} × ${q.b} = ?`;
  document.getElementById('quizOptions').innerHTML=q.opts.map(o=>`<button class="quiz-opt" onclick="chkMul(this,${o})">${o}</button>`).join('');
}
function chkMul(el,v){
  const q=MQ.qs[MQ.cur];document.querySelectorAll('#quizOptions .quiz-opt').forEach(b=>b.disabled=true);
  if(v===q.ans){el.classList.add('correct');MQ.ok++}else{el.classList.add('wrong');document.querySelectorAll('#quizOptions .quiz-opt').forEach(b=>{if(+b.textContent===q.ans)b.classList.add('correct')})}
  setTimeout(()=>{MQ.cur++;MQ.cur<MQ.qs.length?showMulQ():finMul()},700);
}
function finMul(){
  closeQuizModal();
  const {mode,ok}=MQ;
  if(mode===10){S.daily.quizMul10+=ok;if(S.daily.quizMul10>=10&&S.daily.quizMul10-ok<10){S.water++;toast(`答对${ok}题！获得水 💧`)}else toast(`答对${ok}题！还需${Math.max(0,10-S.daily.quizMul10)}题`)}
  else{S.daily.quizMul19+=ok;if(S.daily.quizMul19>=10&&S.daily.quizMul19-ok<10){S.treats++;toast(`答对${ok}题！获得猫条 🧶`)}else toast(`答对${ok}题！还需${Math.max(0,10-S.daily.quizMul19)}题`)}
  save();render();
}
function closeQuizModal(){closeModal('quizModal')}

// ===== 24 POINT =====
const SOLVABLE24=[[1,2,3,8],[1,2,4,6],[1,3,4,5],[2,3,4,5],[2,3,4,6],[3,3,4,6],[1,2,5,8],[1,2,6,8],[1,3,4,8],[1,4,5,6],[2,2,3,8],[2,3,3,6],[2,4,4,7],[3,3,3,8],[3,3,5,5],[4,4,4,4],[1,2,3,4],[1,2,3,6],[1,2,4,8],[2,2,2,9],[2,2,4,8],[2,3,3,8],[2,3,6,6],[2,4,4,6],[3,3,4,4],[3,4,4,5],[1,1,4,6],[1,3,6,6],[6,6,6,6],[5,5,5,1],[2,2,6,6],[8,8,8,3],[9,9,9,5],[1,5,5,5],[2,2,2,6],[3,4,6,6],[1,1,3,8],[1,2,2,8],[2,3,3,4],[3,5,5,9],[1,4,6,7]];

let P24={sets:[],cur:0,ok:0,usedNums:[],expr:[]};
function startQuiz24(){
  if(S.daily.quiz24>=5){toast('今天24点已完成~');return}
  P24={sets:[],cur:0,ok:0,usedNums:[],expr:[]};
  for(let i=0;i<5;i++)P24.sets.push(shuf([...SOLVABLE24[r(0,SOLVABLE24.length-1)]]).sort(()=>Math.random()-.5));
  show24Q();openModal('quiz24Modal');
}

function show24Q(){
  const cards=P24.sets[P24.cur];
  document.getElementById('p24Progress').textContent=`${P24.cur+1}/5 · 已答对${P24.ok}`;
  document.getElementById('p24Cards').innerHTML=cards.map((c,i)=>`<div class="p24-card" id="p24c${i}" onclick="pick24Num(${i})">${c}</div>`).join('');
  P24.usedNums=[];P24.expr=[];
  render24Display();
  build24Keypad(cards);
  document.getElementById('p24Result').textContent='';
}

function build24Keypad(cards){
  const ops=['+','−','×','÷','(',')'];
  let html='';
  // Row: numbers
  html+=cards.map((c,i)=>`<button class="p24-key" id="p24k${i}" onclick="pick24Num(${i})">${c}</button>`).join('');
  // Row: operators
  html+=ops.map(o=>`<button class="p24-key op" onclick="pick24Op('${o}')">${o}</button>`).join('');
  // Row: del, clear, submit
  html+=`<button class="p24-key del" onclick="del24()">⌫</button>`;
  html+=`<button class="p24-key action" onclick="clear24()">清空</button>`;
  html+=`<button class="p24-key op" style="grid-column:span 3" onclick="submit24()">= 24 ?</button>`;
  document.getElementById('p24Keypad').innerHTML=html;
}

function pick24Num(idx){
  if(P24.usedNums.includes(idx))return;
  P24.usedNums.push(idx);
  P24.expr.push({type:'num',val:P24.sets[P24.cur][idx],idx});
  document.getElementById('p24c'+idx).style.opacity='.3';
  document.getElementById('p24k'+idx).style.opacity='.3';
  render24Display();
}
function pick24Op(op){
  P24.expr.push({type:'op',val:op});
  render24Display();
}
function del24(){
  if(!P24.expr.length)return;
  const last=P24.expr.pop();
  if(last.type==='num'){
    const i=P24.usedNums.indexOf(last.idx);
    if(i>-1)P24.usedNums.splice(i,1);
    const el=document.getElementById('p24c'+last.idx);if(el)el.style.opacity='1';
    const k=document.getElementById('p24k'+last.idx);if(k)k.style.opacity='1';
  }
  render24Display();
}
function clear24(){
  P24.expr=[];P24.usedNums=[];
  document.querySelectorAll('.p24-card').forEach(e=>e.style.opacity='1');
  document.querySelectorAll('.p24-key').forEach(e=>e.style.opacity='1');
  render24Display();
  document.getElementById('p24Result').textContent='';
}
function render24Display(){
  const d=document.getElementById('p24Display');
  if(!P24.expr.length){d.textContent='点击数字和运算符组成24';return}
  d.innerHTML=P24.expr.map(t=>{
    if(t.type==='num')return `<span class="token num-token">${t.val}</span>`;
    return `<span class="token op-token">${t.val}</span>`;
  }).join('');
}

function submit24(){
  if(!P24.expr.length)return;
  let expr='';
  const cards=P24.sets[P24.cur].map(String);
  const usedCards=[];
  for(const t of P24.expr){
    if(t.type==='num'){expr+=t.val;usedCards.push(String(t.val))}
    else{expr+=t.val.replace('−','-').replace('×','*').replace('÷','/')}
  }
  // Check all 4 numbers used
  const cc=[...cards];let ok=true;
  for(const n of usedCards){const i=cc.indexOf(n);if(i===-1){ok=false;break}cc.splice(i,1)}
  if(!ok){document.getElementById('p24Result').innerHTML='<span style="color:var(--danger)">❌ 请使用全部4张牌</span>';return}
  try{
    const res=Function('"use strict";return('+expr+')')();
    if(Math.abs(res-24)<0.01){
      document.getElementById('p24Result').innerHTML='<span style="color:var(--success)">✅ 正确！太棒了！</span>';
      P24.ok++;S.daily.quiz24++;
      if(S.daily.quiz24===5){S.food++;toast('完成5道24点！获得猫粮 🐟')}
      save();render();
      setTimeout(()=>{P24.cur++;P24.cur<5?show24Q():(closeModal('quiz24Modal'),toast(`24点结束！答对${P24.ok}/5`))},1000);
    }else{
      document.getElementById('p24Result').innerHTML=`<span style="color:var(--danger)">❌ = ${Number.isInteger(res)?res:res.toFixed(2)}，不是24哦</span>`;
    }
  }catch(e){document.getElementById('p24Result').innerHTML='<span style="color:var(--danger)">⚠️ 表达式不完整</span>'}
}

// ===== TOWER =====
function renderTower(){
  document.getElementById('towerFloor').textContent=`第 ${S.towerCurrent+1} 层`;
  document.getElementById('towerBest').textContent=`最高纪录: 第 ${S.towerBest} 层`;
}

function startTower(){
  const floor=S.towerCurrent+1;
  const ts={qs:[],cur:0,ok:0,floor};
  for(let i=0;i<20;i++){
    const maxN=Math.min(19,Math.floor(3+floor*0.16+Math.random()*3));
    const a=r(2,maxN),b=r(2,maxN),ans=a*b;
    ts.qs.push({a,b,ans,opts:genOpts(ans,4)});
  }
  window._ts=ts;
  document.getElementById('towerMain').style.display='none';
  document.getElementById('towerQuiz').style.display='block';
  showTowerQ();
}
function showTowerQ(){
  const ts=window._ts,q=ts.qs[ts.cur];
  document.getElementById('towerQProgress').textContent=`第${ts.floor}层 · ${ts.cur+1}/20`;
  document.getElementById('towerBar').style.width=`${(ts.cur/20)*100}%`;
  document.getElementById('towerQuestion').textContent=`${q.a} × ${q.b} = ?`;
  document.getElementById('towerOptions').innerHTML=q.opts.map(o=>`<button class="quiz-opt" onclick="chkTower(this,${o})">${o}</button>`).join('');
}
function chkTower(el,v){
  const ts=window._ts,q=ts.qs[ts.cur];
  document.querySelectorAll('#towerOptions .quiz-opt').forEach(b=>b.disabled=true);
  if(v===q.ans){el.classList.add('correct');ts.ok++}else{el.classList.add('wrong');document.querySelectorAll('#towerOptions .quiz-opt').forEach(b=>{if(+b.textContent===q.ans)b.classList.add('correct')})}
  setTimeout(()=>{ts.cur++;ts.cur<20?showTowerQ():finTower()},500);
}
function finTower(){
  const ts=window._ts,passed=ts.ok>=15;
  document.getElementById('towerQuiz').style.display='none';
  document.getElementById('towerMain').style.display='block';
  if(passed){
    S.towerCurrent=ts.floor;if(ts.floor>S.towerBest)S.towerBest=ts.floor;
    const unlockFloor=Math.floor(ts.floor/10)*10;
    const unlock=TOWER_CATS.find(c=>c.floor===unlockFloor);
    if(unlock&&!S.unlocked.includes(unlock.id)){S.unlocked.push(unlock.id);toast(`🎉 解锁新品种：${unlock.breed}！`)}
    toast(`通关！答对${ts.ok}/20 🎉`);
  }else{S.towerCurrent=0;toast(`挑战失败！答对${ts.ok}/20，需要15题 😢`)}
  save();render();renderTower();
}
function closeTowerModal(){
  document.getElementById('towerQuiz').style.display='none';
  document.getElementById('towerMain').style.display='block';
  closeModal('towerModal');
}

// ===== COLLECTION =====
function renderColl(){
  document.getElementById('collectionGrid').innerHTML=ALL_CATS.map(c=>{
    const unlocked=S.unlocked.includes(c.id);
    const active=S.activeCat===c.id;
    return `<div class="collection-item ${active?'active':''} ${unlocked?'':'locked'}" onclick="showCatDetail('${c.id}')">
      ${makeMiniCat(c.theme)}
      <div class="breed-name">${c.name}</div>
      <div class="unlock-info">${unlocked?(active?'✅ 使用中':'点击查看'):'🔒 未解锁'}</div>
    </div>`;
  }).join('');
}

function showCatDetail(id){
  const c=ALL_CATS.find(x=>x.id===id);if(!c)return;
  const unlocked=S.unlocked.includes(id);
  const active=S.activeCat===id;
  const unlockText=c.floor?`爬塔第 ${c.floor} 层解锁`:unlocked?'初始猫咪':'未解锁';
  document.getElementById('catDetail').innerHTML=`
    ${makeCatHTML(c.theme,2,active&&S.level>=10)}
    <div class="detail-name">${c.name}</div>
    <div class="detail-breed">${c.breed}</div>
    <div style="color:#888;font-size:.85em;margin:6px 0">${c.desc}</div>
    <div class="detail-unlock">${unlockText}</div>
    ${unlocked?`<div class="detail-actions">
      <button class="btn ${active?'btn-ghost':'btn-primary'} btn-sm" onclick="switchCat('${id}')">${active?'当前使用中':'设为形象'}</button>
    </div>`:''}
  `;
  closeModal('collectionModal');
  openModal('catDetailModal');
}

function switchCat(id){
  S.activeCat=id;save();render();
  closeModal('catDetailModal');
  const c=ALL_CATS.find(x=>x.id===id);
  toast(`已切换为 ${c.name}！`);
}

// ===== TOAST =====
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>e.classList.remove('show'),2500)}

// ===== START =====
if(S.started){showScreen('game');render()}else initPicker();
</script>
